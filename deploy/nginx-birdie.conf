server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /opt/birdie/app/frontend/dist;
    index index.html;

    client_max_body_size 10m;

    # PWA shell + service worker must NEVER be cached by the browser,
    # otherwise frontend deploys get stuck behind stale caches.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }
    location = /sw.js {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # Hashed Vite bundles in /assets/ are content-addressed and immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSockets (live round push, future)
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }

    # SPA fallback for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }
}
