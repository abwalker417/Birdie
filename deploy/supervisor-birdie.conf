[program:birdie-api]
command=/opt/birdie/venv/bin/uvicorn main:app --host 127.0.0.1 --port 8000 --workers 2 --proxy-headers
directory=/opt/birdie/app/backend
user=birdie
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=15
stderr_logfile=/var/log/birdie-api.err.log
stdout_logfile=/var/log/birdie-api.out.log
environment=HOME="/opt/birdie",USER="birdie",PYTHONUNBUFFERED="1"
